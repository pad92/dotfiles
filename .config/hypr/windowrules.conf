# в–Җв–„в–Җв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–Ҳв–„в–ҲвҖғв–Җв–„в–Җв–„в–ҖвҖғ вҖғв–Ҳв–Җв–„вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғв–„в–Ҳ

# See https://wiki.hyprland.org/Configuring/Window-Rules/


windowrule {
    name = polkit-agents
    match:class = ^(?i)(hyprpolkitagent|polkit-kde-authentication-agent-1|org.kde.polkit-kde-authentication-agent-1|polkit-gnome-authentication-agent-1|gcr-prompter|pinentry-.*)$
    float = true
    center = true
    rounding = 12
}

windowrule {
    name = steam-float
    match:class = ^(?i)(steam)$
    match:title = ^(?i)(Friends List|.*Chat.*|Settings|.* - News|Screenshot)$
    float = true
    size = 700 750
    rounding = 12
}

windowrule {
    name = steam-signin
    match:title = ^(?i)(Sign in to Steam)$
    float = true
    center = true
}

windowrule {
    name = steam-no-center
    match:class = ^(?i)(steam)$
    center = false
}

windowrule {
    name = pavucontrol
    match:class = ^(?i)(pavucontrol|org.pulseaudio.pavucontrol|pavucontrol-qt)$
    float = true
    size = 900 600
    rounding = 12
}

windowrule {
    name = password-managers
    match:class = ^(?i)(org.keepassxc.KeePassXC|Bitwarden|1Password)$
    float = true
    center = true
}

windowrule {
    name = keepassxc
    match:class = ^(?i)(org.keepassxc.KeePassXC)$
    size = 900 500
}

windowrule {
    name = keepassxc-unlock
    match:class = ^(?i)(org.keepassxc.KeePassXC)$
    match:title = ^(?i)(Unlock Database)$
    float = true
}

windowrule {
    name = bitwarden
    match:class = ^(?i)(Bitwarden)$
    size = 800 600
}

windowrule = float on, match:class ^(Rofi)$, match:title ^(rofi - dmenu)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(codium)$, match:title ^(Save Workspace)$
windowrule = float on, match:class ^(com.github.wwmm.easyeffects)$
windowrule = float on, match:class ^(firefox)$, match:title ^(Library)$
windowrule = float on, match:class ^(kitty)$, match:title ^(btop)$
windowrule = float on, match:class ^(kitty)$, match:title ^(htop)$
windowrule = float on, match:class ^(kitty)$, match:title ^(top)$
windowrule = float on, match:class ^(kvantummanager)$
windowrule = float on, match:class ^(nm-applet)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(nwg-look)$
windowrule = float on, match:class ^(org.kde.ark)$
windowrule = float on, match:class ^(org.kde.dolphin)$, match:title ^(Copying вҖ” Dolphin)$
windowrule = float on, match:class ^(org.kde.dolphin)$, match:title ^(Progress Dialog вҖ” Dolphin)$
windowrule = float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float on, match:class ^(qt5ct)$
windowrule = float on, match:class ^(qt6ct)$
windowrule = float on, match:class ^(vlc)$
windowrule = float on, match:title ^(About Mozilla Firefox)$
windowrule = float on, match:title ^(Picture-in-Picture)$

windowrule = float on, match:class ^(app.drey.Warp)$ # Warp-Gtk
windowrule = float on, match:class ^(com.github.rafostar.Clapper)$ # Clapper-Gtk
windowrule = float on, match:class ^(com.github.unrud.VideoDownloader)$ # VideoDownloader-Gkk
windowrule = float on, match:class ^(eog)$ # Imageviewer-Gtk
windowrule = float on, match:class ^(io.github.alainm23.planify)$ # planify-Gtk
windowrule = float on, match:class ^(io.gitlab.adhami3310.Impression)$ # Impression-Gtk
