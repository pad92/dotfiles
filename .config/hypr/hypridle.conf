general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms("on")'
}
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

listener {
    timeout = 900
    on-timeout = hyprctl dispatch 'hl.dsp.dpms("off")'
    on-resume  = hyprctl dispatch 'hl.dsp.dpms("on")'
}

# Suspend after 1h of inactivity — PadsTower only (hypridle has no
# per-host mechanism, so the command guards on the hostname).
# True hibernation is unavailable there (zram-only swap, no resume= param).
listener {
    timeout = 3600
    on-timeout = [ "$(cat /proc/sys/kernel/hostname)" = "PadsTower" ] && systemctl suspend
}
