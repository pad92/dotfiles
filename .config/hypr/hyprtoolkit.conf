# =============================================================================
# HYPRTOOLKIT THEME CONFIGURATION
# =============================================================================
# Configures the global appearance for ecosystem applications using hyprtoolkit,
# matching the Gruvbox Harmonious Accents configuration in config.lua.
# Official Spec: https://wiki.hypr.land/Hypr-Ecosystem/hyprtoolkit/

# Colors (Hex format: 0xAARRGGBB)
background = 0xFF1d2021
base = 0xFF282828
alternate_base = 0xFF3c3836
text = 0xFFebdbb2
bright_text = 0xFFfbf1c7
accent = 0xFF83a598
accent_secondary = 0xFF8ec07c

# Typography
font_family = DejaVu Sans
font_family_monospace = JetBrainsMono Nerd Font
font_size = 10
small_font_size = 9
h1_size = 18
h2_size = 14
h3_size = 12

# Icon / GTK Theme
icon_theme = Papirus-Dark
gtk_theme = Materia-dark-compact

# Geometry
rounding_large = 10
rounding_small = 5
