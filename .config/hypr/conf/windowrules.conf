# ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ   ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚Ėą‚ĖĄ ‚ĖĄ‚Ėą

# See https://wiki.hyprland.org/Configuring/Window-Rules/


windowrule {
    name = polkit-agents
    match:class = ^(?i)(hyprpolkitagent|polkit-kde-authentication-agent-1|org.kde.polkit-kde-authentication-agent-1|polkit-gnome-authentication-agent-1|gcr-prompter|pinentry-.*)$
    float = true
    center = true
    rounding = 12
}

windowrule {
    name = steam-float
    match:class = ^(?i)(steam)$
    match:title = ^(?i)(Friends List|.*Chat.*|Settings|.* - News|Screenshot)$
    float = true
    size = 700 750
    rounding = 12
}

windowrule {
    name = steam-signin
    match:title = ^(?i)(Sign in to Steam)$
    float = true
    center = true
}

windowrule {
    name = steam-no-center
    match:class = ^(?i)(steam)$
    center = false
}

windowrule {
    name = steam-bigpicture
    match:class = ^(?i)(steam)$
    match:title = ^(?i)(Steam Big Picture Mode)$
    fullscreen = true
    monitor = desc:ASUSTek COMPUTER INC XG32WCS TALMAS012758
}

windowrule {
    name = steam-games
    match:class = ^(?i)(gamescope|steam_app_.*)$
    fullscreen = true
    monitor = desc:ASUSTek COMPUTER INC XG32WCS TALMAS012758
    immediate = true
}

windowrule {
    name = pavucontrol
    match:class = ^(?i)(pavucontrol|org.pulseaudio.pavucontrol|pavucontrol-qt)$
    float = true
    size = 900 600
    rounding = 12
}

windowrule {
    name = password-managers
    match:class = ^(?i)(org.keepassxc.KeePassXC|Bitwarden|1Password)$
    float = true
    center = true
}

windowrule {
    name = keepassxc
    match:class = ^(?i)(org.keepassxc.KeePassXC)$
    size = 900 500
}

windowrule {
    name = keepassxc-unlock
    match:class = ^(?i)(org.keepassxc.KeePassXC)$
    match:title = ^(?i)(Unlock Database)$
    float = true
}

windowrule {
    name = bitwarden
    match:class = ^(?i)(Bitwarden)$
    size = 800 600
}

windowrule = float on, match:class ^(Rofi)$, match:title ^(rofi - dmenu)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(codium)$, match:title ^(Save Workspace)$
