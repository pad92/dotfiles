# WebRTC echo cancellation and noise suppression.
# Captures from the default mic, presents a clean virtual source "Mic_Clean".
# monitor.mode = true captures speaker output for AEC without a virtual sink.

context.modules = [
    { name = libpipewire-module-echo-cancel
        args = {
            library.name = aec/libspa-aec-webrtc
            monitor.mode = true

            aec.args = {
                webrtc.echo_cancellation = true
                webrtc.noise_suppression = true
                webrtc.extended_filter   = true
                webrtc.highpass_filter    = true
                webrtc.voice_detection   = true
            }

            capture.props = {
                node.name    = "Echo_Cancel_Capture"
                node.passive = true
            }
            source.props = {
                node.name        = "Mic_Clean"
                node.description = "Microphone (Voix Filtrée - Sans Écho)"
                audio.rate       = 48000
            }
        }
    }
]
