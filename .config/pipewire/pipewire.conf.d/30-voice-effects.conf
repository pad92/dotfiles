# Unified Voice and Reverb Effects Configuration.
#
# This file configures several virtual audio sources (microphones) with real-time effects.
# All effect filters capture audio from the pre-processed, clean voice node ("Mic_Clean")
# and apply LADSPA audio processing plugins.

context.modules = [
    # 1. Darth Vader Voice Effect (Deep Pitch Shift)
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Microphone (Darth Vader)"
            media.name       = "Microphone (Darth Vader)"
            filter.graph = {
                nodes = [
                    {
                        type   = ladspa
                        name   = pitch
                        plugin = "/usr/lib/ladspa/am_pitchshift_1433.so"
                        label  = "amPitchshift"
                        control = {
                            "Pitch shift" = 0.75
                        }
                    }
                ]
            }
            capture.props = {
                node.name      = "Vader_Capture"
                node.passive   = true
                target.object  = "Mic_Clean"
                audio.rate     = 48000
            }
            playback.props = {
                node.name      = "Mic_Vader"
                media.class    = "Audio/Source"
                audio.rate     = 48000
            }
        }
    }

    # 2. Chipmunk Voice Effect (High Pitch Shift)
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Microphone (Chipmunk)"
            media.name       = "Microphone (Chipmunk)"
            filter.graph = {
                nodes = [
                    {
                        type   = ladspa
                        name   = pitch
                        plugin = "/usr/lib/ladspa/am_pitchshift_1433.so"
                        label  = "amPitchshift"
                        control = {
                            "Pitch shift" = 1.55
                        }
                    }
                ]
            }
            capture.props = {
                node.name      = "Chipmunk_Capture"
                node.passive   = true
                target.object  = "Mic_Clean"
                audio.rate     = 48000
            }
            playback.props = {
                node.name      = "Mic_Chipmunk"
                media.class    = "Audio/Source"
                audio.rate     = 48000
            }
        }
    }

    # 3. Giant / Orc / Monster Voice Effect (Very Deep Pitch Shift)
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Microphone (Monstre / Géant)"
            media.name       = "Microphone (Monstre / Géant)"
            filter.graph = {
                nodes = [
                    {
                        type   = ladspa
                        name   = pitch
                        plugin = "/usr/lib/ladspa/am_pitchshift_1433.so"
                        label  = "amPitchshift"
                        control = {
                            "Pitch shift" = 0.58
                        }
                    }
                ]
            }
            capture.props = {
                node.name      = "Monster_Capture"
                node.passive   = true
                target.object  = "Mic_Clean"
                audio.rate     = 48000
            }
            playback.props = {
                node.name      = "Mic_Monster"
                media.class    = "Audio/Source"
                audio.rate     = 48000
            }
        }
    }

    # 4. Helium Voice Effect (Childish Voice Effect)
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Microphone (Effet Hélium)"
            media.name       = "Microphone (Effet Hélium)"
            filter.graph = {
                nodes = [
                    {
                        type   = ladspa
                        name   = pitch
                        plugin = "/usr/lib/ladspa/am_pitchshift_1433.so"
                        label  = "amPitchshift"
                        control = {
                            "Pitch shift" = 1.30
                        }
                    }
                ]
            }
            capture.props = {
                node.name      = "Helium_Capture"
                node.passive   = true
                target.object  = "Mic_Clean"
                audio.rate     = 48000
            }
            playback.props = {
                node.name      = "Mic_Helium"
                media.class    = "Audio/Source"
                audio.rate     = 48000
            }
        }
    }

    # 5. Church / Cathedral Reverb Effect (GVerb Reverb Plugin)
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Microphone (Église / Cathédrale)"
            media.name       = "Microphone (Église / Cathédrale)"
            filter.graph = {
                nodes = [
                    {
                        type   = ladspa
                        name   = reverb
                        plugin = "/usr/lib/ladspa/gverb_1216.so"
                        label  = "gverb"
                        control = {
                            "Roomsize (m)" = 75.0
                            "Reverb time (s)" = 3.5
                            "Damping" = 0.50
                            "Input bandwidth" = 0.75
                            "Dry signal level (dB)" = 0.0
                            "Early reflection level (dB)" = -12.0
                            "Tail level (dB)" = -15.0
                        }
                    }
                ]
            }
            capture.props = {
                node.name      = "Church_Capture"
                node.passive   = true
                target.object  = "Mic_Clean"
                audio.rate     = 48000
            }
            playback.props = {
                node.name      = "Mic_Church"
                media.class    = "Audio/Source"
                audio.rate     = 48000
            }
        }
    }
]
