    # 6. Robot Voice Effect (Ringmod with LFO)
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Microphone (Robot)"
            media.name       = "Microphone (Robot)"
            filter.graph = {
                nodes = [
                    {
                        type   = ladspa
                        name   = ringmod
                        plugin = "/usr/lib/ladspa/ringmod_1188.so"
                        label  = "ringmod_1i1o1l"
                        control = {
                            "Modulation depth (0=none, 1=AM, 2=RM)" = 2.0
                            "Frequency (Hz)" = 55.0
                            "Sine level" = 1.0
                            "Triangle level" = 0.0
                            "Sawtooth level" = 0.0
                            "Square level" = 0.0
                        }
