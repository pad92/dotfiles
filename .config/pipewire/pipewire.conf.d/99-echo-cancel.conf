context.modules = [
    { name = libpipewire-module-echo-cancel
        args = {
            # Use standard PipeWire WebRTC AEC library
            library.name = aec/libspa-aec-webrtc

            # IMPORTANT: Enable monitor mode to automatically capture all audio
            # sent to the default output (your Logitech BT speakers).
            # This eliminates the need to create a virtual output device (sink)
            # and manually reroute each application's audio.
            monitor.mode = true

            aec.args = {
                webrtc.echo_cancellation = true
                webrtc.noise_suppression = true
                webrtc.extended_filter = true
            }

            # Target the physical Blue Yeti microphone for capture
            capture.props = {
                node.name = "Yeti_Echo_Cancel_Capture"
                target.object = "alsa_input.usb-Blue_Microphones_Yeti_X_2149SG005728_888-000316110306-00.iec958-stereo"
            }

            # Configuration of the virtual filtered microphone that will appear in your applications (Discord, Zoom, etc.)
            source.props = {
                node.name = "Yeti_Mic_Clean"
                node.description = "Blue Yeti (Voix Filtrée - Sans Écho)"
                audio.rate = 48000
            }
        }
    }
]
