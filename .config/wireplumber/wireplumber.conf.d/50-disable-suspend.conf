# Disable automatic suspend for all ALSA and Bluetooth audio devices
# to prevent popping sounds and audio startup latency.

monitor.alsa.rules = [
    {
        matches = [
            {
                node.name = "~alsa_output.*"
            },
            {
                node.name = "~alsa_input.*"
            }
        ]
        actions = {
            update-props = {
                session.suspend-timeout-seconds = 0
            }
        }
    }
]

monitor.bluez.rules = [
    {
        matches = [
            {
                node.name = "~bluez_output.*"
            },
            {
                node.name = "~bluez_input.*"
            }
        ]
        actions = {
            update-props = {
                session.suspend-timeout-seconds = 0
            }
        }
    }
]
