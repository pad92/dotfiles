# Bluetooth Configuration for WirePlumber 0.5+

wireplumber.settings = {
    # Disable automatic profile switching to HSP/HFP (low audio quality) when recording
    bluetooth.autoswitch-to-headset-profile = false
}

monitor.bluez.properties = {
    # Enable support for modern codecs and advanced features
    bluez5.enable-sbc-xq = true
    bluez5.enable-msbc = true
    bluez5.enable-hw-volume = true

    # Prefer high-fidelity codecs for music
    bluez5.codecs = [ ldac aptx_hd aptx aac sbc_xq ]
}

monitor.bluez.rules = [
    {
        matches = [
            {
                # Applies to all Bluetooth devices (bluez audio cards)
                device.name = "~bluez_card.*"
            }
        ]
        actions = {
            update-props = {
                # Force LDAC quality to "High Quality" (990 kbps) for CD/Hi-Res fidelity
                bluez5.a2dp.ldac.quality = "hq"
            }
        }
    }
]
