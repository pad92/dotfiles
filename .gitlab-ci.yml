# Documentation GitLab CI : https://docs.gitlab.com/ee/ci/

include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml

stages:
  - test
  - package
  - pages
  - release

# Le SAST tourne par défaut sur tous les commits
sast:
  stage: test

# Job Vim : Se lance uniquement si la conf Vim change
package_vim:
  stage: package
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - tar -czf vim.tar.gz .vim .vimrc
  artifacts:
    paths:
      - vim.tar.gz

# Job Pages : Génère et déploie la documentation
pages:
  stage: pages
  image: alpine:latest
  rules:
    # 1. Déploiement officiel uniquement sur la branche par défaut si les fichiers changent
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "README.md"
        - "CHANGELOG.md"
        - "dist/arch/install.md"
        - ".ci_bin/style.css"
        - ".ci_bin/gen_pages.py"
        - ".gitlab-ci.yml"
    # 2. Permet de tester la compilation sur les autres branches (Merge Requests), mais sans déployer
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      changes:
        - "README.md"
        - "CHANGELOG.md"
        - "dist/arch/install.md"
        - ".ci_bin/style.css"
        - ".ci_bin/gen_pages.py"
      variables:
        # En changeant le nom du job, GitLab ne le traitera pas comme le déploiement "pages" officiel
        CI_JOB_NAME: "build_pages_review"
  script:
    - apk add --no-cache python3 py3-markdown
    - python3 .ci_bin/gen_pages.py README.md public/index.html "Pad's Dotfiles"
    - python3 .ci_bin/gen_pages.py CHANGELOG.md public/CHANGELOG.md/index.html "Changelog"
    - python3 .ci_bin/gen_pages.py dist/arch/install.md public/dist/arch/install.md/index.html "Installation"
  artifacts:
    paths:
      - public

create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      # Extract the version notes from CHANGELOG.md
      # We look for the section starting with ## [vX.Y.Z] and end at the next ##
      # We use a temporary file to store the notes because the release-cli
      # description might be large and we want to avoid shell argument limits.

      VERSION=$CI_COMMIT_TAG
      echo "Extracting notes for $VERSION..."

      # Use sed to extract from the line containing the version header until the next header
      # The regex matches the start of the version header.
      sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md > release_notes.txt

      # Remove the last line (which is the start of the next version) if it exists
      # and remove the first line (the header itself)
      sed -i '1d' release_notes.txt
      # Remove the last line if it matches the start of another version header
      sed -i '$d' release_notes.txt

      # If the file is empty, provide a default message
      if [ ! -s release_notes.txt ]; then
        echo "No specific notes found in CHANGELOG.md for $VERSION." > release_notes.txt
      fi

      # Create the release using release-cli
      release-cli create --name "$VERSION" --description "$(cat release_notes.txt)"
