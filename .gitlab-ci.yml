# Documentation GitLab CI : https://docs.gitlab.com/ee/ci/

include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml

stages:
  - test
  - package
  - pages
  - release

# Le SAST tourne par défaut sure tous les commits
sast:
  stage: test

# Job Vim : Se lance uniquement si la conf Vim change
package_vim:
  stage: package
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - tar -czf vim.tar.gz .vim .vimrc
  artifacts:
    paths:
      - vim.tar.gz

# Job Pages : Génère et déploie la documentation
pages:
  stage: pages
  image: alpine:latest
  rules:
    # 1. Déploiement officiel uniquement sur la branche par défaut si les fichiers changent
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - 'README.md'
        - 'CHANGELOG.md'
        - 'dist/arch/install.md'
        - '.ci_bin/style.css'
        - '.ci_bin/gen_pages.py'
        - '.ci_bin/build_pages.sh'
        - '.github/workflows/README.md'
        - '.gitlab/README.md'
        - '.gitlab-ci.yml'
    # 2. Permet de tester la compilation sure les autres branches (Merge Requests), mais sans déployer
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      changes:
        - 'README.md'
        - 'CHANGELOG.md'
        - 'dist/arch/install.md'
        - '.ci_bin/style.css'
        - '.ci_bin/gen_pages.py'
        - '.ci_bin/build_pages.sh'
        - '.github/workflows/README.md'
        - '.gitlab/README.md'
      variables:
        # En changeant le nom du job, GitLab ne le traitera pas comme le déploiement "pages" officiel
        CI_JOB_NAME: 'build_pages_review'
  script:
    - apk add --no-cache python3 py3-markdown
    - sh .ci_bin/build_pages.sh
  artifacts:
    paths:
      - public

create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - sh .ci_bin/extract_release_notes.sh "$CI_COMMIT_TAG" > release_notes.txt
    - release-cli create --name "$CI_COMMIT_TAG" --description "$(cat release_notes.txt)"
