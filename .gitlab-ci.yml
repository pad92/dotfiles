# Documentation GitLab CI : https://docs.gitlab.com/ee/ci/

include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml

stages:
  - test
  - package
  - pages
  - release

# Le SAST tourne par défaut sure tous les commits
sast:
  stage: test

# Job Vim : Se lance uniquement si la conf Vim change
package_vim:
  stage: package
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - tar -czf vim.tar.gz .vim .vimrc
  artifacts:
    paths:
      - vim.tar.gz

.pages_build:
  stage: pages
  image: alpine:latest
  script:
    - apk add --no-cache python3 py3-markdown
    - sh .ci_bin/build_pages.sh
  artifacts:
    paths:
      - public

# Job Pages : Génère et déploie la documentation sur la branche par défaut
pages:
  extends: .pages_build
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - 'README.md'
        - 'CHANGELOG.md'
        - 'dist/arch/install.md'
        - '.ci_bin/style.css'
        - '.ci_bin/gen_pages.py'
        - '.ci_bin/build_pages.sh'
        - '.github/workflows/README.md'
        - '.gitlab/README.md'
        - '.gitlab-ci.yml'

# Job de validation Pages : construit les docs sur les branches non-déployées
build_pages_review:
  extends: .pages_build
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      changes:
        - 'README.md'
        - 'CHANGELOG.md'
        - 'dist/arch/install.md'
        - '.ci_bin/style.css'
        - '.ci_bin/gen_pages.py'
        - '.ci_bin/build_pages.sh'
        - '.github/workflows/README.md'
        - '.gitlab/README.md'
  artifacts:
    paths:
      - public
    expire_in: 1 week

create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - sh .ci_bin/extract_release_notes.sh "$CI_COMMIT_TAG" > release_notes.txt
    - release-cli create --name "$CI_COMMIT_TAG" --description "$(cat release_notes.txt)"
