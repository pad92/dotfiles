# Documentation GitLab CI : https://docs.gitlab.com/ee/ci/

include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml

stages:
  - test
  - package
  - pages

# Le SAST tourne par défaut sur tous les commits
sast:
  stage: test

# Job Vim : Se lance uniquement si la conf Vim change
package_vim:
  stage: package
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  rules:
    - changes:
        - ".vimrc"
        - ".vim/**/*"
        - "vim.sh"
        - ".gitlab-ci.yml"
  script:
    - tar -czf vim.tar.gz .vim .vimrc
  artifacts:
    paths:
      - vim.tar.gz

# Job Pages : Génère et déploie la documentation
pages:
  stage: pages
  image: alpine:latest
  rules:
    # 1. Déploiement officiel uniquement sur la branche par défaut si les fichiers changent
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "README.md"
        - "CHANGELOG.md"
        - "dist/arch/install.md"
        - "style.css"
        - ".gitlab-ci.yml"
    # 2. Permet de tester la compilation sur les autres branches (Merge Requests), mais sans déployer
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      changes:
        - "README.md"
        - "CHANGELOG.md"
        - "dist/arch/install.md"
        - "style.css"
      variables:
        # En changeant le nom du job, GitLab ne le traitera pas comme le déploiement "pages" officiel
        CI_JOB_NAME: "build_pages_review"
  script:
    - apk add --no-cache pandoc
    - mkdir -p public/dist/arch/install.md/
    - cp style.css public/style.css
    - pandoc README.md -s -c style.css -o public/index.html --metadata title="Documentation"
    - pandoc CHANGELOG.md -s -c style.css -o public/changelog.html --metadata title="Changelog"
    - pandoc dist/arch/install.md -s -c ../../../style.css -o public/dist/arch/install.md/index.html --metadata title="Installation"
  artifacts:
    paths:
      - public
