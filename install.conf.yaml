- defaults:
    link:
      relink: true

- link:
    ~/.Xresources: .Xresources
    ~/.screenrc: .screenrc
    ~/.tmux.conf: .tmux.conf
    ~/.tmux: .tmux
    ~/.vim: .vim
    ~/.vimrc: .vimrc
    ~/.zshenv: .zshenv
    ~/.zshrc: .zshrc
    ~/.gitconfig: .gitconfig
    ~/.gtkrc-2.0: .gtkrc-2.0
    ~/.config/:
      glob: true
      path: .config/*
      force: true

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - ["ln -sf config.$(hostname) ~/.config/waybar/config", Setting up Waybar host config]
