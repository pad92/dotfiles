set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Gruvbox Dark palette (aligned with waybar/style.css and gruvbox.nvim)
#   bg0h #1d2021  bg0 #282828  bg1 #3c3836  bg2 #504945
#   fg1 #ebdbb2  gray #928374  light4 #a89984
#   yellow #fabd2f  green #b8bb26  blue #83a598  aqua #8ec07c
#   orange #fe8019  red #fb4934

# Status bar
set -g status-style "bg=#282828,fg=#a89984"
set -g status-left "#[bg=#a89984,fg=#282828,bold] #S #[default] "
set -g status-left-length 20
set -g status-right "#[fg=#ebdbb2]%H:%M #[bg=#3c3836,fg=#ebdbb2] %d-%b-%y #[bg=#a89984,fg=#282828,bold] #h "
set -g status-right-length 40

# Windows
setw -g window-status-format "#[fg=#a89984] #I:#W#F "
setw -g window-status-current-format "#[bg=#fabd2f,fg=#282828,bold] #I:#W#F "
setw -g window-status-activity-style "fg=#fe8019,bold"
setw -g window-status-bell-style "fg=#fb4934,bold"

# Panes
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#fabd2f"

# Messages and command prompt
set -g message-style "bg=#3c3836,fg=#ebdbb2"
set -g message-command-style "bg=#3c3836,fg=#fabd2f"

# Copy mode and selection
setw -g mode-style "bg=#504945,fg=#ebdbb2"

# Clock and pane number display
setw -g clock-mode-colour "#83a598"
set -g display-panes-colour "#a89984"
set -g display-panes-active-colour "#fabd2f"

# Start numbering at 1
set -g base-index 1

# C-b is not acceptable -- Vim uses it
set-option -g prefix C-a
bind-key C-a last-window

# set window split
bind-key v split-window -h -c "#{pane_current_path}"
bind-key b split-window -c "#{pane_current_path}"

# scroll with mouse
set -g terminal-overrides 'xterm*:smcup@:rmcup@'


# Allows for faster key repetition
set -s escape-time 0

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on

# Allows us to use C-a a <command> to send commands to a TMUX session inside
# another TMUX session
bind-key a send-prefix

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# auto window rename
set-window-option -g automatic-rename

# hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

bind-key C command-prompt -p "Name of new window: " "new-window -n '%%'"

# reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

run -b '~/.tmux/plugins/tpm/tpm'
