name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Prevent multiple concurrent runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of Least Privilege: explicitly define permissions
permissions:
  contents: read

jobs:
  # Security Gate: Must pass before packaging or publishing
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main

      - name: SAST (CodeQL Init)
        uses: github/codeql-action/init@v3
        with:
          languages: 'python'

      - name: SAST (CodeQL Analysis)
        uses: github/codeql-action/analyze@v3

  # Parallel Job: Package Vim configuration
  package:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Package Vim configuration
        run: tar -czf vim.tar.gz .vim .vimrc

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: vim-package
          path: vim.tar.gz

  # Parallel Job: Generate Documentation Page
  pages:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate HTML from README
        run: |
          sudo apt-get update && sudo apt-get install -y pandoc
          mkdir -p public/dist/arch/install.md/
          cp style.css public/style.css

          pandoc README.md -s -c style.css -o public/index.html --metadata title="Documentation"
          pandoc CHANGELOG.md -s -c style.css -o public/changelog.html --metadata title="Changelog"
          pandoc dist/arch/install.md -s -c style.css -o public/dist/arch/install.md/index.html --metadata title="Installation"

      - name: Upload public folder
        uses: actions/upload-artifact@v4
        with:
          name: public-site
          path: public/
