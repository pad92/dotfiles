name: Deploy GitHub Pages

on:
  push:
    branches: ['main']
    paths:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'dist/arch/install.md'
      - '.ci_bin/style.css'
      - '.ci_bin/gen_pages.py'
      - '.ci_bin/build_pages.sh'
      - '.github/workflows/README.md'
      - '.gitlab/README.md'
      - '.github/workflows/deploy-pages.yml'
  pull_request:
    branches: ['main']
    paths:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'dist/arch/install.md'
      - '.ci_bin/style.css'
      - '.ci_bin/gen_pages.py'
      - '.ci_bin/build_pages.sh'
      - '.github/workflows/README.md'
      - '.gitlab/README.md'

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    # Skip on non-GitHub forges (e.g. Gitea, which also scans .github/workflows).
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate HTML pages
        run: |
          pip install --quiet markdown
          sh .ci_bin/build_pages.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
