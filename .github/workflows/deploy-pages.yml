name: Deploy GitHub Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - "README.md"
      - "CHANGELOG.md"
      - "dist/arch/install.md"
      - "style.css"
      - ".github/workflows/deploy-pages.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "README.md"
      - "CHANGELOG.md"
      - "dist/arch/install.md"
      - "style.css"

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate HTML from README
        run: |
          sudo apt-get update && sudo apt-get install -y pandoc
          mkdir -p public/dist/arch/install.md/ public/changelog.md/
          cp style.css public/style.css
          pandoc README.md -s -c style.css -o public/index.html --metadata title="Documentation"
          pandoc CHANGELOG.md -s -c ../style.css -o public/changelog.md/index.html --metadata title="Changelog"
          pandoc dist/arch/install.md -s -c ../../../style.css -o public/dist/arch/install.md/index.html --metadata title="Installation"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
