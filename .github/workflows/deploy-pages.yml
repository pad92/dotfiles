name: Deploy GitHub Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - "README.md"
      - "CHANGELOG.md"
      - "dist/arch/install.md"
      - ".ci_bin/style.css"
      - ".ci_bin/gen_pages.py"
      - ".github/workflows/deploy-pages.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "README.md"
      - "CHANGELOG.md"
      - "dist/arch/install.md"
      - ".ci_bin/style.css"
      - ".ci_bin/gen_pages.py"

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate HTML from README
        run: |
          pip install markdown
          python3 .ci_bin/gen_pages.py README.md public/index.html "Pad's Dotfiles"
          python3 .ci_bin/gen_pages.py CHANGELOG.md public/CHANGELOG.md/index.html "Changelog"
          python3 .ci_bin/gen_pages.py dist/arch/install.md public/dist/arch/install.md/index.html "Installation"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
