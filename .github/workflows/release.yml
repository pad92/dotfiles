name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract release notes
        id: notes
        run: |
          # Stash the multi-line notes in a step output using a delimiter so
          # newlines survive.
          {
            echo "body<<EOF"
            sh .ci_bin/extract_release_notes.sh "$GITHUB_REF_NAME"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          # Token, API URL and repo are provided by both the GitHub and Gitea
          # runners, and the release endpoint is API-compatible across the two,
          # so this single workflow works on either forge.
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          NOTES: ${{ steps.notes.outputs.body }}
        run: |
          # Build the JSON payload with jq so arbitrary Markdown is escaped safely.
          jq -n --arg tag "$TAG" --arg body "$NOTES" \
            '{tag_name: $tag, name: $tag, body: $body}' \
          | curl -fsSL -X POST \
              -H "Authorization: token $TOKEN" \
              -H "Content-Type: application/json" \
              -d @- \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases"
